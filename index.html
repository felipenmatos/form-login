<html>
    <head>
        <title>Form Contato</title>
    </head>
    <style>
        *{margin: 0;padding: 0;box-sizing: border-box;}
        body{
            background-color: aquamarine;
        }

        form{
            background-color: rgb(214, 214, 214);
            max-width: 500px;
            width: 70%;
            padding: 20px;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            }
        form h3{
            text-align: center;
            color: rgb(170, 170, 26);
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        }
        
        form input[type=text],
        form input[type=password]{
            width: 100%;
            height: 45px;
            border: 1px solid #ccc;
            padding-left: 10px;
            margin: 10px 0;
        }

        form input[type=submit]{
            width: 100%;
            height: 40px;
            cursor: pointer;
            background: rgb(170, 170, 26);
            color: rgb(41, 17, 17);
            border: 0;
            border-radius: 20px;
        }

        form input[type=submit]:hover{
            background-color: rgb(224, 224, 36);
        }

    </style>
    <body>
        <form>
            <h3>Entrar em Contato</h3>
            <input type="text" nome="email" placeholder="Seu e-mail..."/>
            <input type="password" nome="senha" placeholder="Sua senha..."/>
            <input type="submit" nome="ação" value="Enviar"/>
        </form>
    </body>
</html>
